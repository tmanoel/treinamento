<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Biblioteca Pessoal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Biblioteca Pessoal</h1>

    <div id="mensagem" role="status" aria-live="polite"></div>

    <section>
        <h2>Livros cadastrados</h2>
        <table id="tabela-livros">
            <thead>
                <tr>
                    <th>Título</th>
                    <th>Autor</th>
                    <th>Editora</th>
                    <th>Ano</th>
                    <th>Lido</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
        <p id="lista-vazia" hidden>Nenhum livro cadastrado.</p>
    </section>

    <script src="script.js"></script>
</body>
</html>
